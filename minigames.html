<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CKZiU - minigames</title>

    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        color: white;
        text-align: center;
        background: linear-gradient(rgba(41, 74, 112, 0.8), rgba(41, 74, 112, 0.8)),
          url("ckziu.jpg");
        background-size: cover;
        background-position: center;

        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .roll {
        position: absolute;
        bottom: -26px;
        left: 50%;
        transform: translateX(-50%);
        background-color: #9e6816;
        padding: 6px 16px;
        border-radius: 0 0 8px 8px;
        font-size: 12px;
        cursor: pointer;
      }

      .container {
        background: rgba(0, 0, 0, 0.5);
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
      }

      h1 {
        margin-bottom: 10px;
        font-size: 36px;
      }

      p {
        margin-bottom: 30px;
        font-size: 16px;
        color: #ddd;
      }

      .btn {
        display: block;
        width: 250px;
        margin: 10px auto;
        padding: 15px;
        font-size: 18px;
        border: none;
        border-radius: 8px;
        background-color: #f4a024;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
      }

      .btn:hover {
        background-color: #c47f1c;
        transform: scale(1.05);
      }

      .memory,
      .quiz {
        background: none;
        border: none;
        color: white;
        font-size: 16px;
        margin-right: 10px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>CKZiU - Minigry</h1>
      <p>
        Wybierz jedną z dostępnych gier i sprawdź swoją pamięć lub wiedzę o szkole.
      </p>

      <button class="btn" onclick="window.location.href='memory.html'">
        MEMORY
      </button>

      <button class="btn" onclick="window.location.href='index.html'">
        QUIZ
      </button>
    </div>
  </body>
</html>
